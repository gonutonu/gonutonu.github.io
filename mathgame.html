
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Math Challenge</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6fb;
text-align:center;
padding:20px;
}

.game{
background:white;
max-width:400px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

h1{
color:#173f7a;
}

.question{
font-size:32px;
font-weight:bold;
margin:20px 0;
}

input{
padding:12px;
font-size:20px;
width:120px;
text-align:center;
}

button{
margin-top:15px;
padding:12px 25px;
font-size:18px;
background:#173f7a;
color:white;
border:none;
border-radius:10px;
}

.score{
font-size:22px;
color:green;
margin-top:15px;
}

.result{
font-size:20px;
margin-top:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="game">

<h1>🧮 Math Challenge</h1>

<div class="score">
Score: <span id="score">0</span>
</div>

<div class="question" id="question">
5 + 3
</div>

<input type="number" id="answer">

<br>

<button onclick="checkAnswer()">
Submit
</button>

<div class="result" id="result"></div>

</div>

<script>

let score = 0;
let num1, num2, answer;

function newQuestion(){

num1 = Math.floor(Math.random()*20)+1;
num2 = Math.floor(Math.random()*20)+1;

let operations = ['+','-','×'];
let op = operations[Math.floor(Math.random()*3)];

if(op==='+'){
answer = num1 + num2;
}

if(op==='-'){
answer = num1 - num2;
}

if(op==='×'){
answer = num1 * num2;
}

document.getElementById("question").innerHTML =
num1 + " " + op + " " + num2;

document.getElementById("answer").value="";
}

function checkAnswer(){

let userAnswer =
Number(document.getElementById("answer").value);

if(userAnswer===answer){

score++;

document.getElementById("score").innerHTML=score;

document.getElementById("result").innerHTML=
"✅ Correct";

}else{

document.getElementById("result").innerHTML=
"❌ Wrong! Answer = " + answer;
}

newQuestion();
}

newQuestion();

</script>

</body>
</html>
